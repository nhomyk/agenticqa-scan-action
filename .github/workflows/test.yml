name: Test agenticqa-scan-action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Self-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run agenticqa-scan-action against this repo
        id: scan
        uses: ./
        with:
          fail-on-critical: 'false'
          fail-on-score: '0'
          sarif-output: 'test-results.sarif'
          upload-sarif: 'false'

      - name: Assert outputs are set
        run: |
          echo "findings-count:      ${{ steps.scan.outputs.findings-count }}"
          echo "critical-count:      ${{ steps.scan.outputs.critical-count }}"
          echo "attack-surface-score: ${{ steps.scan.outputs.attack-surface-score }}"
          echo "test-coverage:       ${{ steps.scan.outputs.test-coverage }}"
          echo "untested-count:      ${{ steps.scan.outputs.untested-count }}"

          if [ -z "${{ steps.scan.outputs.attack-surface-score }}" ]; then
            echo "FAIL: attack-surface-score output is empty"
            exit 1
          fi
          if [ -z "${{ steps.scan.outputs.findings-count }}" ]; then
            echo "FAIL: findings-count output is empty"
            exit 1
          fi
          echo "PASS: all outputs set"

      - name: Assert SARIF file exists
        run: |
          if [ ! -f "test-results.sarif" ]; then
            echo "FAIL: SARIF file not created"
            exit 1
          fi
          echo "PASS: SARIF file exists ($(wc -c < test-results.sarif) bytes)"

      - name: Assert score is numeric and in range
        run: |
          score="${{ steps.scan.outputs.attack-surface-score }}"
          if ! echo "$score" | grep -qE '^[0-9]+$'; then
            echo "FAIL: attack-surface-score is not a number: $score"
            exit 1
          fi
          if [ "$score" -gt 100 ]; then
            echo "FAIL: score $score exceeds maximum of 100"
            exit 1
          fi
          echo "PASS: score=$score/100 is valid"
